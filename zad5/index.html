<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadanie 5 - Formularz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Formularz kontaktowy</h2>
        <form id="contactForm">
            <div class="form-group">
                <label for="firstName">Imię:</label>
                <input type="text" id="firstName" placeholder="Wpisz imię">
                <span id="firstNameError" class="error-msg"></span>
            </div>

            <div class="form-group">
                <label for="lastName">Nazwisko:</label>
                <input type="text" id="lastName" placeholder="Wpisz nazwisko">
                <span id="lastNameError" class="error-msg"></span>
            </div>

            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="text" id="email" placeholder="przyklad@poczta.pl">
                <span id="emailError" class="error-msg"></span>
            </div>

            <div class="form-group">
                <label for="message">Wiadomość:</label>
                <textarea id="message" rows="4" placeholder="Twoja wiadomość..."></textarea>
                <span id="messageError" class="error-msg"></span>
            </div>

            <button type="submit">Wyślij</button>
        </form>
        <div id="successMessage" class="success-msg"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
